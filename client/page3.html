<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPSearch — Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="step-indicator">
            <div class="step completed">1</div>
            <div class="step completed">2</div>
            <div class="step active">3</div>
        </div>

        <h1 class="page-title">Search Results</h1>

        <div id="loadingSection" class="card">
            <div class="loading-overlay">
                <div class="spinner"></div>
                <h3>Analyzing...</h3>
                <p style="color: #666;">Querying SQL Server schema — this should be quick.</p>
            </div>
        </div>

        <div id="errorBox" class="alert alert-error hidden"></div>

        <div id="resultsSection" class="hidden">
            <div id="summaryCards" class="result-summary"></div>

            <div id="resultsTableContainer" class="card">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Schema</th>
                                <th>Table Name</th>
                                <th>Column Name</th>
                                <th>Data Type</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody"></tbody>
                    </table>
                </div>
                <div id="emptyResults" class="hidden" style="text-align:center;padding:2rem;font-weight:600;color:#9CA3AF;">
                    No tables found containing the specified columns.
                </div>
            </div>

            <div class="action-bar">
                <button id="btnNewSearch" class="btn btn-secondary">&larr; New Search</button>
                <button id="btnDownloadLog" class="btn btn-warning">Download Log</button>
                <button id="btnNewConnection" class="btn btn-danger">New Connection</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
