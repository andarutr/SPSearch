<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SPSearch — Connect</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div class="container">
            <div class="step-indicator">
                <span class="badge step bg-success">SIGN</span>
                <span class="badge step bg-primary">SEARCH</span>
                <span class="badge step bg-secondary">RESULT</span>
            </div>

            <h1 class="page-title">SQL Schema Search</h1>

            <div class="card">
                <h2>Server Connection</h2>
                <p class="text-muted">
                    Enter your SQL Server credentials to begin searching.
                </p>

                <div id="errorBox" class="alert alert-error hidden"></div>

                <div class="form-group">
                    <label for="server">Server</label>
                    <input
                        type="text"
                        id="server"
                        placeholder="e.g. localhost or SQLSRV01"
                        autocomplete="off"
                    />
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="trustedAuth" />
                        Use Windows Authentication
                    </label>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="trustCert" />
                        Trust Server Certificate
                    </label>
                </div>

                <div id="sqlAuthFields">
                    <div class="row" style="margin-bottom: 0">
                        <div class="col-md-8">
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input
                                    type="text"
                                    id="username"
                                    placeholder="sa or domain\user"
                                    autocomplete="off"
                                />
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="port">Port</label>
                                <input type="number" id="port" value="1433" />
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            placeholder="********"
                        />
                    </div>
                </div>

                <div style="margin-top: 1.5rem">
                    <button id="btnSign" class="btn btn-primary btn-lg w-100">
                        SIGN IN
                    </button>
                </div>
            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
