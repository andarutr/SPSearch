<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPSearch — Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="step-indicator">
            <div class="step completed">1</div>
            <div class="step active">2</div>
            <div class="step">3</div>
        </div>

        <h1 class="page-title">Define Search</h1>

        <div id="errorBox" class="alert alert-error hidden"></div>

        <div class="card">
            <h2>Database &amp; Table</h2>

            <div class="form-group">
                <label for="databaseSelect">Database</label>
                <select id="databaseSelect">
                    <option value="">— Select Database —</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tableSelect">Table <span style="font-weight:400;color:#6B7280;">(optional — narrow search)</span></label>
                <select id="tableSelect">
                    <option value="">— All Tables —</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h2>Columns to Find</h2>
            <p class="text-muted">
                Enter column names you're looking for. Matching is fuzzy — partial names work.
            </p>

            <div id="columnsContainer">
                <div class="column-row" data-index="0">
                    <input type="text" class="col-input" placeholder="e.g. Name, Email, Address">
                </div>
            </div>

            <div style="margin-top: 0.5rem;">
                <button id="btnAddColumn" class="btn btn-secondary">+ Add Column</button>
            </div>
        </div>

        <div class="action-bar">
            <button id="btnBack" class="btn btn-secondary">&larr; Back</button>
            <button id="btnSearch" class="btn btn-success" style="flex:1;">SEARCH</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
